<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ComfyUI Output Browser</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="layout">
  <div id="sidebar">
    <h2>Filters</h2>
    <input id="search" type="text" placeholder="Search prompt text...">
    <button id="clear-btn">Clear all filters</button>
    <button id="refresh-btn">Rescan folder</button>
    <div id="filters"></div>
  </div>
  <div id="main">
    <div id="scan-banner"></div>
    <div id="status"></div>
    <div id="grid"></div>
  </div>
</div>

<div id="modal">
  <button id="modal-close">&times;</button>
  <div id="modal-content">
    <img id="modal-img" src="">
    <div id="modal-meta"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
